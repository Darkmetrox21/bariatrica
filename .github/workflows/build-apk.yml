name: Build APK

"on":
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-22.04

    env:
      ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
      ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip curl \
            python3-pip python3-setuptools python3-wheel \
            build-essential ccache \
            autoconf automake libtool pkg-config \
            zlib1g-dev libncurses-dev \
            cmake libffi-dev libssl-dev

      - name: Install Python build dependencies
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install buildozer==1.5.0 cython==0.29.36

      - name: Install Android command line tools
        run: |
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          cd /tmp
          curl -L -o commandlinetools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools.zip
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          mv cmdline-tools/* "$ANDROID_SDK_ROOT/cmdline-tools/latest/"

          mkdir -p "$ANDROID_SDK_ROOT/tools/bin"
          ln -sf "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "$ANDROID_SDK_ROOT/tools/bin/sdkmanager"
          ln -sf "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/avdmanager" "$ANDROID_SDK_ROOT/tools/bin/avdmanager"

          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/tools/bin" >> $GITHUB_PATH

      - name: Accept Android licenses and install SDK packages
        run: |
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses || true
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2"

      - name: Clean old Buildozer cache
        run: |
          rm -rf .buildozer
          rm -rf ~/.buildozer/android/platform/build-arm64-v8a
          rm -rf ~/.buildozer/android/platform/build-armeabi-v7a

      - name: Check project files
        run: |
          echo "Archivos del proyecto:"
          ls -la
          echo "Contenido buildozer.spec:"
          cat buildozer.spec

      - name: Build APK
        run: |
          buildozer -v android debug

      - name: Find APK
        if: always()
        run: |
          find . -name "*.apk" -type f || true

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cuidadora-bariatrica-apk
          path: bin/*.apk
