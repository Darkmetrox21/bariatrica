name: Build APK

"on":
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip \
            openjdk-17-jdk \
            python3-pip python3-setuptools python3-wheel \
            build-essential ccache \
            autoconf automake libtool pkg-config \
            zlib1g-dev libncurses-dev \
            cmake libffi-dev libssl-dev

      - name: Install Python build dependencies
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install buildozer==1.5.0 cython==0.29.36

      - name: Accept Android SDK licenses
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          echo "8933bad161af4178b1189a37fbf41ea5269c55" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license

      - name: Check project files
        run: |
          echo "Archivos del proyecto:"
          ls -la
          echo "Contenido buildozer.spec:"
          cat buildozer.spec

      - name: Build APK
        run: |
          buildozer -v android debug

      - name: Find APK
        if: always()
        run: |
          find . -name "*.apk" -type f || true

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cuidadora-bariatrica-apk
          path: bin/*.apk
